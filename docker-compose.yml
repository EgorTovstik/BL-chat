services:
  backend:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - /app/.venv
      - /app/frontend/node_modules
      - backend_logs:/app/logs
    environment:
      # Переменные БД (явно, без подстановки из .env)
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=BL_chat
      - DB_USER=postgres
      - DB_PASSWORD=12345qwert
      - DATABASE_URL=postgresql+asyncpg://postgres:12345qwert@db:5432/BL_chat
      # FastAPI / JWT
      - SECRET_KEY=I0KjnLaDg8WnK-xY1ynHh1xn-uNPActP32hmi8Z7OT8
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=120
      # CORS
      - CORS_ORIGINS=http://localhost:5173
    depends_on:
      db:
        condition: service_healthy  # ждём, пока БД будет готова
    networks:
      - app-net

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000/api/v1
      - VITE_WS_URL=ws://localhost:8000/api/v1/ws
    depends_on:
      - backend
    networks:
      - app-net

  db:  # ← НОВЫЙ сервис PostgreSQL
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=12345qwert
      - POSTGRES_DB=BL_chat
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-net
    healthcheck:  # проверяем готовность БД
      test: ["CMD-SHELL", "pg_isready -U postgres -d BL_chat"]
      interval: 5s
      timeout: 5s
      retries: 10

networks:
  app-net:
    driver: bridge

volumes:
  backend_logs:
  postgres_data:  # ← не забудь добавить!